{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <title>registro_ponto</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta content="" name="keywords" />
    <meta content="" name="description" />
    <meta name="google-site-verification" content="1KeffJp1rmmOH965oTslCuL4t8TGzFvNBHubnH09nIU" />
    <link rel="icon" href="{% static 'core/img/logo/favicon.ico' %}" type="image/x-icon" />
    <!-- Sentry Config on Frontend -->
    {% if SENTRY_JS_URL %}
      <script src="{{ SENTRY_JS_URL }}" crossorigin="anonymous"></script>

      <script>
        Sentry.onLoad(function () {
          Sentry.init({
            integrations: [Sentry.replayIntegration()],
            replaysSessionSampleRate: 0.1,
            replaysOnErrorSampleRate: 1.0
          })
        })
      </script>
    {% endif %}
    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wdth,wght@0,75..100,300..800;1,75..100,300..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet" />

    <!-- Icon Font Stylesheet -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet" />

    <!-- Libraries Stylesheet -->
    <link href="{% static 'core/libs/animate/animate.min.css' %}" rel="stylesheet" />
    <link href="{% static 'core/libs/owlcarousel/owl.carousel.min.css' %}" rel="stylesheet" />

    <!-- Customized Bootstrap Stylesheet -->
    <link href="{% static 'core/libs/bootstrap/bootstrap.min.css' %}" rel="stylesheet" />

    <!-- Template Stylesheet -->
    <link href="{% static 'public/css/style.css' %}" rel="stylesheet" />
  </head>

  <body>
    <!-- Spinner Start -->
    <div id="spinner" class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
      <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
        <span class="sr-only">Loading...</span>
      </div>
    </div>
    <!-- Spinner End -->

    <!-- Navbar & Hero Start -->
    <div class="container-fluid position-relative p-0">
      <nav class="navbar navbar-expand-lg navbar-light px-4 px-lg-5 py-3 py-lg-0">
        <a href="{% url 'public_home' %}" class="navbar-brand p-0"><h1 class="text-primary"><img src="{% static 'core/img/logo/registro_ponto_border.svg' %}" width="240" alt="registro_ponto" id="logo" /></h1></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse"><span class="fa fa-bars"></span></button>
        <div class="collapse navbar-collapse" id="navbarCollapse">
          <div class="navbar-nav ms-auto py-0">
            <a href="{% url 'public_home' %}" class="nav-item nav-link">Início</a>
            <a href="{% url 'public_web:orcamento' %}" class="nav-item nav-link">Solicite um orçamento</a>
          </div>
          <!-- <button class="btn btn-primary btn-md-square d-flex flex-shrink-0 mb-3 mb-lg-0 rounded-circle me-3" data-bs-toggle="modal" data-bs-target="#searchModal"><i class="fas fa-search"></i></button> -->
          <a href="{% url 'auth_web:login' %}" class="btn btn-primary rounded-pill d-inline-flex flex-shrink-0 py-2 px-4">Entrar</a>
        </div>
      </nav>

      {% block header %}

      {% endblock %}
    </div>
    <!-- Navbar & Hero End -->

    <!-- Main -->
    <main>
      {% block content %}

      {% endblock %}
    </main>

    <!-- Copyright Start -->
    <div class="container-fluid copyright py-4">
      <div class="container">
        <div class="row g-4 align-items-center">
          <div class="col-md-6 text-center text-md-start mb-md-0">
            <span class="text-white">Desenvolvido por Luiz Felipe Silveira.</span>
          </div>
        </div>
      </div>
    </div>
    <!-- Copyright End -->

    <!-- Back to Top -->
    <a href="#" class="btn btn-primary btn-lg-square rounded-circle back-to-top"><i class="fa fa-arrow-up"></i></a>

    <!-- JavaScript Libraries -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'core/libs/wow/wow.min.js' %}"></script>
    <script src="{% static 'core/libs/easing/easing.min.js' %}"></script>
    <script src="{% static 'core/libs/waypoints/waypoints.min.js' %}"></script>
    <script src="{% static 'core/libs/counterup/counterup.min.js' %}"></script>
    <script src="{% static 'core/libs/owlcarousel/owl.carousel.min.js' %}"></script>

    <!-- Template Javascript -->
    <script src="{% static 'public/js/public_main.min.js' %} "></script>

    {% block js %}

    {% endblock %}
  </body>
</html>
